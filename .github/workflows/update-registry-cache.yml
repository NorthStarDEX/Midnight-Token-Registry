name: Update registry cache

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Index registry
        run: npm run index --silent > registry/preprod.tokens.json

      - name: Validate cache
        run: node -e "JSON.parse(require('node:fs').readFileSync('registry/preprod.tokens.json', 'utf8'))"

      - name: Commit cache update
        run: |
          set -euo pipefail

          if git diff --quiet -- registry/preprod.tokens.json; then
            echo "No registry cache changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/preprod.tokens.json
          git commit -m "Update preprod registry cache"
          git push
